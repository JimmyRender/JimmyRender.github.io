<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>JIMMY.RENDER</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #02050a;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <iframe id="app-frame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    
    <script>
        let currentMode = null; // 'desktop' or 'mobile'
        
        function checkOrientation() {
            const isPortrait = window.innerHeight >= window.innerWidth;
            const isMobile = /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
            
            const targetMode = (isPortrait || isMobile) ? 'mobile' : 'desktop';
            
            if (currentMode !== targetMode) {
                currentMode = targetMode;
                const iframe = document.getElementById('app-frame');
                
                // Show loading state if needed. The inner HTML has its own loader.
                if (targetMode === 'mobile') {
                    iframe.src = '/mobile.html';
                } else {
                    iframe.src = '/desktop.html';
                }
            }
        }
        
        // Initial load
        checkOrientation();
        
        // Listen for resizes or orientation changes
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(checkOrientation, 150);
        });
        
    </script>
</body>
</html>
