<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>JIMMY.RENDER</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #02050a;
        background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='3' height='3' fill='%23ffffff' fill-opacity='0.08'/%3E%3C/svg%3E");
        background-size: 4px 4px;
        background-position: 0 0;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-user-drag: none;
      }
      iframe {
        border: none;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <script>
      let currentMode = null; // 'desktop' or 'mobile'

      function checkOrientation() {
        const isPortrait = window.innerHeight >= window.innerWidth;
        const isMobile =
          /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(
            navigator.userAgent,
          ) || window.innerWidth <= 768;

        const targetMode = isPortrait || isMobile ? "mobile" : "desktop";

        if (targetMode === "mobile") {
          window.location.replace("/mobile.html");
        } else {
          window.location.replace("/desktop.html");
        }
      }

      // Initial load
      checkOrientation();
    </script>
  </body>
</html>
